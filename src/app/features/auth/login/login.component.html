<div class="login-page">

  <!-- Painel Esquerdo -->
  <div class="panel-left">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div class="brand-wrapper">
      <svg class="ucsal-crest" viewBox="0 0 120 120">
        <path d="M60 8 L104 24 L104 64 C104 88 60 112 60 112 C60 112 16 88 16 64 L16 24 Z"
              fill="rgba(10,42,102,0.6)" stroke="#D4AF37" stroke-width="2"/>
        <path d="M60 18 L96 31 L96 62 C96 82 60 102 60 102 C60 102 24 82 24 62 L24 31 Z"
              fill="rgba(0,63,138,0.4)" stroke="#D4AF37" stroke-width="1"/>
        <rect x="55" y="28" width="10" height="48" rx="2" fill="#D4AF37"/>
        <rect x="36" y="50" width="48" height="10" rx="2" fill="#D4AF37"/>
      </svg>

      <h1 class="brand-title">UCSal</h1>
      <p class="brand-subtitle">Universidade Católica do Salvador</p>
      <div class="divider-gold"></div>
      <p class="tagline">
        Portal Acadêmico — Gerencie turmas, notas e atividades.
      </p>
    </div>
  </div>

  <!-- Painel Direito -->
  <div class="panel-right">
    <div class="form-card">

      <div class="form-header">
        <h2>Bem-vindo de volta</h2>
        <p>Faça login para continuar</p>
      </div>

      <div class="error-msg" *ngIf="erro">
        {{ erro }}
      </div>

      <!-- Email -->
      <div class="field">
        <label>E-mail institucional</label>
        <div class="input-wrap">
          <input type="email" [(ngModel)]="email" placeholder="seu@ucsal.edu.br">
        </div>
      </div>

      <!-- Senha -->
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <input type="password" [(ngModel)]="senha" placeholder="••••••••">
        </div>
      </div>

      <div class="accent-line"></div>

      <button class="btn-entrar" (click)="entrar()" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="form-footer">
        <a href="#">Esqueci minha senha</a>
        •
        <a href="mailto:washquesia@gmail.com?subject=Suporte%20TI&body=Descreva%20seu%20problema">
          Suporte TI
        </a>
      </div>

    </div>
  </div>

</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* NOVA PALETA */
  :root {
    --ucsal-blue:    #0A2A66;
    --ucsal-blue-2:  #003F8A;
    --ucsal-dark:    #020C1B;
    --ucsal-gold:    #D4AF37;
    --ucsal-gold-lt: #F2D57E;

    --white:         #FFFFFF;
    --gray-50:       #F4F6FB;
    --gray-200:      #DCE2EE;
    --gray-400:      #7C8AA5;
    --gray-600:      #3E4A5E;

    --error:         #E5484D;
  }

  .login-page {
    display: flex;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }

  /* ESQUERDA */
  .panel-left {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;

    background:
            radial-gradient(circle at 20% 30%, rgba(212,175,55,.25), transparent 60%),
            radial-gradient(circle at 80% 70%, rgba(0,63,138,.6), transparent 60%),
            linear-gradient(160deg, #020C1B 0%, #0A2A66 55%, #001F4D 100%);
  }

  .brand-title {
    font-size: 2.5rem;
    font-family: 'Playfair Display';
  }

  .brand-subtitle {
    color: var(--ucsal-gold-lt);
    margin-top: .5rem;
  }

  .divider-gold {
    width: 60px;
    height: 3px;
    margin: 1.5rem auto;
    background: linear-gradient(90deg, transparent, #D4AF37, #F2D57E, transparent);
  }

  .tagline {
    color: rgba(255,255,255,.6);
    font-size: .9rem;
  }

  /* DIREITA */
  .panel-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gray-50);
  }

  .form-card {
    width: 100%;
    max-width: 380px;
  }

  .form-header h2 {
    font-family: 'Playfair Display';
    font-size: 1.8rem;
  }

  .field {
    margin-top: 1.2rem;
  }

  .field label {
    font-size: .75rem;
    color: var(--gray-600);
  }

  .field input {
    width: 100%;
    padding: .8rem;
    border-radius: 10px;
    border: 1px solid var(--gray-200);
    background: linear-gradient(180deg, #fff, #f9fbff);
  }

  .field input:focus {
    outline: none;
    border-color: var(--ucsal-blue-2);
    box-shadow: 0 0 0 4px rgba(0,63,138,.12);
  }

  /* BOTÃO */
  .btn-entrar {
    margin-top: 2rem;
    width: 100%;
    padding: .9rem;
    border-radius: 12px;
    border: none;

    background: linear-gradient(135deg, #0A2A66, #0055C8);
    color: white;
    font-weight: bold;

    cursor: pointer;
    transition: .3s;
  }

  .btn-entrar:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0,63,138,.4);
  }

  /* FOOTER */
  .form-footer {
    margin-top: 1.5rem;
    text-align: center;
  }

  .form-footer a {
    color: var(--ucsal-blue);
    text-decoration: none;
  }
</style>
